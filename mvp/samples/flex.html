<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0;
    background-color: #0f172a;
    color: #e2e8f0;
    font-size: 15px;
  }
  .page {
    padding: 24px;
  }
  h1 {
    color: #f8fafc;
    font-size: 26px;
    margin: 0;
    margin-bottom: 4px;
    font-weight: bold;
  }
  .lead {
    color: #94a3b8;
    margin-top: 0;
    margin-bottom: 20px;
    font-size: 14px;
  }

  /* Navbar: flex row, space-between */
  .nav {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    background-color: #1e293b;
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 12px;
    padding-left: 16px;
    padding-right: 16px;
    margin-bottom: 20px;
  }
  .brand { font-weight: bold; color: #f1f5f9; font-size: 18px; }
  .nav-links { display: flex; flex-direction: row; gap: 16px; align-items: center; }
  .nav-link { color: #cbd5e1; font-size: 14px; }
  .cta {
    background-color: #22c55e;
    color: #052e16;
    padding: 8px;
    padding-left: 14px;
    padding-right: 14px;
    border-radius: 8px;
    font-weight: bold;
    font-size: 13px;
  }

  /* Stat row: flex row, space-around, centered */
  .stats {
    display: flex;
    flex-direction: row;
    justify-content: space-around;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .stat {
    background-color: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 16px;
    width: 150px;
    text-align: center;
  }
  .num {
    color: #38bdf8;
    font-size: 26px;
    font-weight: bold;
    margin-bottom: 4px;
  }
  .lbl {
    color: #94a3b8;
    font-size: 12px;
  }

  /* Footer with centered content */
  .footer {
    display: flex;
    flex-direction: row;
    justify-content: center;
    align-items: center;
    gap: 12px;
    border: 1px solid #334155;
    border-radius: 999px;
    padding: 10px;
    background-color: #1e293b;
    color: #94a3b8;
    font-size: 13px;
  }
</style>
</head>
<body>
<div class="page">
  <h1>Flexbox-lite demo</h1>
  <p class="lead">Single-line flex with justify-content, align-items, gap.</p>

  <div class="nav">
    <div class="brand">BrowserEngine</div>
    <div class="nav-links">
      <div class="nav-link">Docs</div>
      <div class="nav-link">Samples</div>
      <div class="nav-link">GitHub</div>
      <div class="cta">Download</div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="num">1.2k</div><div class="lbl">lines of Rust</div></div>
    <div class="stat"><div class="num">6</div><div class="lbl">CSS properties</div></div>
    <div class="stat"><div class="num">60fps</div><div class="lbl">on the author's laptop</div></div>
    <div class="stat"><div class="num">0</div><div class="lbl">JS engines (yet)</div></div>
  </div>

  <div class="footer">
    <div>Rendered by browser-engine-mvp</div>
    <div>·</div>
    <div>M2 milestone</div>
  </div>
</div>
</body>
</html>
