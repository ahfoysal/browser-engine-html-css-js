<!DOCTYPE html>
<html>
<head>
<style>
  body { background-color: #ffffff; margin: 16px; color: #111; font-size: 16px; }
  .card { background-color: #e3f2fd; padding: 16px; margin: 12px; }
  .card-red { background-color: #ffebee; padding: 16px; margin: 12px; color: #b71c1c; }
  .card-green { background-color: #e8f5e9; padding: 16px; margin: 12px; color: #1b5e20; }
  h2 { font-size: 26px; margin: 8px; color: #0d47a1; }
  p { font-size: 16px; margin: 6px; }
</style>
</head>
<body>
  <h2>Box model demo</h2>
  <div class="card">
    <h2>Blue Card</h2>
    <p>Block-level boxes stack vertically with margin and padding.</p>
  </div>
  <div class="card-red">
    <h2>Red Card</h2>
    <p>Each card has its own background, padding, and margin.</p>
  </div>
  <div class="card-green">
    <h2>Green Card</h2>
    <p>Colors, fonts, and box sizes all cascade from CSS.</p>
  </div>
</body>
</html>
